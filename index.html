<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>~/ai-notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c08;
      --bg2:      #0d120d;
      --bg3:      #131913;
      --text:     #b8e8b8;
      --text-dim: #4d7a4d;
      --green:    #4dff91;
      --green-glow: rgba(77,255,145,0.4);
      --amber:    #ffcc44;
      --cyan:     #44e8ff;
      --red:      #ff5555;
      --prompt:   #44ff88;
    }

    html, body {
      height: 100%;
      background: #000;
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.65;
      overflow: hidden;
    }

    /* ── CRT wrapper ─────────────────────────────────────────────────────────── */
    .crt-outer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, #0a100a 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Scanlines */
    .crt-outer::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 200;
    }

    /* Vignette */
    .crt-outer::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 201;
    }

    /* ── Terminal window ─────────────────────────────────────────────────────── */
    @keyframes crt-on {
      0%   { opacity: 0; transform: scaleY(0.01); filter: brightness(4); }
      15%  { opacity: 1; transform: scaleY(0.01); filter: brightness(4); }
      25%  { transform: scaleY(1.04); filter: brightness(2); }
      35%  { transform: scaleY(0.98); }
      100% { transform: scaleY(1); filter: brightness(1); }
    }

    @keyframes border-breathe {
      0%, 100% { box-shadow: 0 0 0 1px #1c2e1c, 0 0 25px rgba(77,255,145,0.12), 0 0 60px rgba(77,255,145,0.04), 0 20px 60px rgba(0,0,0,0.85); }
      50%       { box-shadow: 0 0 0 1px #1c2e1c, 0 0 35px rgba(77,255,145,0.20), 0 0 80px rgba(77,255,145,0.08), 0 20px 60px rgba(0,0,0,0.85); }
    }

    .terminal {
      width: min(940px, 96vw);
      height: min(660px, 92vh);
      background: var(--bg);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: crt-on 0.45s ease-out, border-breathe 5s ease-in-out 0.5s infinite;
    }

    /* ── Title bar ───────────────────────────────────────────────────────────── */
    .titlebar {
      background: var(--bg3);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1c2e1c;
      flex-shrink: 0;
      user-select: none;
    }

    .dots { display: flex; gap: 7px; }
    .dot  { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28ca41; box-shadow: 0 0 6px rgba(40,202,65,0.6); }

    .titlebar-title {
      flex: 1;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    /* ── Nav bar ─────────────────────────────────────────────────────────────── */
    .nav-bar {
      padding: 5px 20px;
      border-bottom: 1px solid #1c2e1c;
      display: flex;
      gap: 4px;
      align-items: center;
      background: var(--bg2);
      flex-shrink: 0;
    }

    .nav-btn {
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      background: none;
      border: none;
      padding: 3px 10px;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.04em;
    }
    .nav-btn::before { content: '[ '; }
    .nav-btn::after  { content: ' ]'; }
    .nav-btn:hover  { color: var(--green); background: rgba(77,255,145,0.06); }
    .nav-btn.active { color: var(--green); text-shadow: 0 0 8px var(--green-glow); }

    .nav-sep { color: var(--text-dim); font-size: 11px; opacity: 0.4; }

    /* ── Output area ─────────────────────────────────────────────────────────── */
    .output {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 10px;
      scroll-behavior: smooth;
    }
    .output::-webkit-scrollbar       { width: 4px; }
    .output::-webkit-scrollbar-track { background: transparent; }
    .output::-webkit-scrollbar-thumb { background: #1c2e1c; border-radius: 2px; }

    /* ── Input area ──────────────────────────────────────────────────────────── */
    .input-area {
      border-top: 1px solid #1c2e1c;
      padding: 11px 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg2);
      flex-shrink: 0;
    }

    .prompt-label {
      color: var(--prompt);
      white-space: nowrap;
      text-shadow: 0 0 10px var(--green-glow);
      font-weight: 700;
      font-size: 13px;
    }

    .cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      caret-color: var(--green);
    }
    .cmd-input::placeholder { color: var(--text-dim); opacity: 0.5; }

    /* ── Text helpers ────────────────────────────────────────────────────────── */
    .line        { margin: 1px 0; }
    .c-dim       { color: var(--text-dim); }
    .c-green     { color: var(--green);  text-shadow: 0 0 8px var(--green-glow); }
    .c-amber     { color: var(--amber); }
    .c-cyan      { color: var(--cyan); }
    .c-red       { color: var(--red); }
    .c-prompt    { color: var(--prompt); text-shadow: 0 0 6px var(--green-glow); }
    .blank       { height: 10px; }

    /* ── Article list row ────────────────────────────────────────────────────── */
    .ls-row {
      display: grid;
      grid-template-columns: 96px 48px 1fr;
      gap: 14px;
      align-items: baseline;
      padding: 2px 0;
    }
    .ls-date { color: var(--text-dim); font-size: 12px; }
    .ls-size { color: var(--amber); text-align: right; font-size: 12px; }
    .ls-name a {
      color: var(--cyan);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.1s, text-shadow 0.1s;
    }
    .ls-name a:hover {
      color: var(--green);
      text-shadow: 0 0 8px var(--green-glow);
    }

    /* ── Tag pill ────────────────────────────────────────────────────────────── */
    .tag {
      display: inline-block;
      border: 1px solid #2a422a;
      color: var(--text-dim);
      font-size: 10px;
      padding: 0 5px;
      border-radius: 2px;
      margin-left: 7px;
      vertical-align: middle;
      letter-spacing: 0.04em;
    }

    /* ── Article content ─────────────────────────────────────────────────────── */
    .article-body { max-width: 720px; }
    .article-body h1, .article-body h2, .article-body h3 {
      color: var(--green);
      text-shadow: 0 0 10px var(--green-glow);
      font-weight: 700;
      margin: 18px 0 8px;
    }
    .article-body h1 { font-size: 18px; }
    .article-body h2 { font-size: 15px; }
    .article-body h3 { font-size: 14px; }
    .article-body h1::before { content: '# ';  color: var(--text-dim); font-weight: 300; }
    .article-body h2::before { content: '## '; color: var(--text-dim); font-weight: 300; }
    .article-body h3::before { content: '### '; color: var(--text-dim); font-weight: 300; }
    .article-body p           { margin: 8px 0; }
    .article-body a           { color: var(--cyan); }
    .article-body strong      { color: var(--amber); font-weight: 700; }
    .article-body em          { color: var(--text); font-style: italic; }
    .article-body code {
      background: var(--bg3);
      color: var(--amber);
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 12px;
    }
    .article-body pre {
      background: var(--bg3);
      border-left: 2px solid var(--green);
      padding: 12px 16px;
      margin: 12px 0;
      overflow-x: auto;
      color: var(--amber);
      font-size: 12px;
      line-height: 1.7;
    }
    .article-body blockquote {
      border-left: 2px solid var(--text-dim);
      padding: 6px 14px;
      color: var(--text-dim);
      font-style: italic;
      margin: 10px 0;
    }
    .article-body ul, .article-body ol { padding-left: 22px; margin: 8px 0; }
    .article-body li                   { margin: 4px 0; }
    .article-body li::marker           { color: var(--green); }
    .article-body .meta               { color: var(--text-dim); font-size: 12px; }
    .article-body hr {
      border: none;
      border-top: 1px solid #1c2e1c;
      margin: 16px 0;
    }

    /* ── Blinking cursor ─────────────────────────────────────────────────────── */
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .cursor {
      display: inline-block;
      width: 8px; height: 15px;
      background: var(--green);
      animation: blink 1.1s step-end infinite;
      vertical-align: text-bottom;
      box-shadow: 0 0 8px var(--green);
      margin-left: 2px;
    }

    /* ── Back link ───────────────────────────────────────────────────────────── */
    .back-link {
      color: var(--cyan);
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover { color: var(--green); text-shadow: 0 0 6px var(--green-glow); }

    /* ── ASCII banner ────────────────────────────────────────────────────────── */
    .ascii-banner {
      color: var(--green);
      opacity: 0.55;
      font-size: 11px;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    /* ── Mobile ──────────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      html, body { font-size: 12px; }
      .terminal  { width: 100vw; height: 100vh; border-radius: 0; }
      .ls-row    { grid-template-columns: 80px 1fr; }
      .ls-size   { display: none; }
      .output    { padding: 12px 14px 8px; }
      .input-area{ padding: 10px 14px; }
    }
  </style>
</head>
<body>
<div class="crt-outer">
  <div class="terminal">

    <!-- Title bar -->
    <div class="titlebar">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="titlebar-title">~/ai-notes — bash</div>
      <div style="width:46px"></div>
    </div>

    <!-- Nav -->
    <div class="nav-bar">
      <button class="nav-btn active" data-view="home"     onclick="showHome()">home</button>
      <span class="nav-sep">·</span>
      <button class="nav-btn"        data-view="articles" onclick="showList()">articles</button>
      <span class="nav-sep">·</span>
      <button class="nav-btn"        data-view="about"    onclick="showAbout()">about</button>
    </div>

    <!-- Output -->
    <div class="output" id="output"></div>

    <!-- Input -->
    <div class="input-area">
      <span class="prompt-label">visitor@ai-notes:~$</span>
      <input class="cmd-input" id="cmdInput" type="text"
             autocomplete="off" autocorrect="off" autocapitalize="off"
             spellcheck="false" placeholder="type 'help' for commands...">
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
const output   = document.getElementById('output');
const cmdInput = document.getElementById('cmdInput');
let ARTICLES   = [];
let cmdHistory = [], histIdx = -1;
const cache    = {};   // article content cache: id → markdown string

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function print(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  output.appendChild(d);
  output.scrollTop = output.scrollHeight;
}
function line(html) { print(`<div class="line">${html}</div>`); }
function blank()    { print('<div class="blank"></div>'); }
function echoCmd(cmd) {
  line(`<span class="c-prompt">visitor@ai-notes:~$</span> ${esc(cmd)}`);
}
function setActive(view) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
}

// ── Fetch helpers ─────────────────────────────────────────────────────────────
async function fetchText(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.text();
}

async function loadManifest() {
  const text = await fetchText('articles/index.json');
  ARTICLES = JSON.parse(text);
}

async function loadArticle(id) {
  if (cache[id]) return cache[id];
  const md = await fetchText(`articles/${id}.md`);
  cache[id] = md;
  return md;
}

// ── Views ─────────────────────────────────────────────────────────────────────
function showHome() {
  output.innerHTML = '';
  setActive('home');
  print(`<pre class="ascii-banner">  ██████╗ ██╗    ███╗  ██╗ ██████╗ ████████╗███████╗███████╗
  ██╔══██╗██║    ████╗ ██║██╔═══██╗╚══██╔══╝██╔════╝██╔════╝
  ███████║██║    ██╔██╗██║██║   ██║   ██║   █████╗  ███████╗
  ██╔══██║██║    ██║╚████║██║   ██║   ██║   ██╔══╝  ╚════██║
  ██║  ██║██║    ██║ ╚███║╚██████╔╝   ██║   ███████╗███████║
  ╚═╝  ╚═╝╚═╝    ╚═╝  ╚══╝ ╚═════╝    ╚═╝   ╚══════╝╚══════╝</pre>`);
  blank();
  line('<span class="c-dim"># AI 學習筆記與技術心得</span>');
  blank();
  line('<span class="c-dim">$ ls -t ./articles/ | head -5</span>');
  blank();
  ARTICLES.slice(0, 5).forEach(renderRow);
  blank();
  line('<span class="c-dim">────────────────────────────────────────────</span>');
  blank();
  line('  <span class="c-cyan">ls</span>       — 列出所有文章');
  line('  <span class="c-cyan">cat</span> &lt;id&gt; — 閱讀文章');
  line('  <span class="c-cyan">about</span>    — 關於');
  line('  <span class="c-cyan">help</span>     — 所有指令');
  blank();
  print('<div class="line c-dim">準備好了。<span class="cursor"></span></div>');
}

function showList() {
  output.innerHTML = '';
  setActive('articles');
  line('<span class="c-dim">$ ls -la ./articles/</span>');
  blank();
  line(`<span class="c-dim">共 ${ARTICLES.length} 篇文章</span>`);
  blank();
  ARTICLES.forEach(renderRow);
  blank();
  line('<span class="c-dim">點擊標題或輸入 <span class="c-cyan">cat &lt;id&gt;</span> 閱讀文章</span>');
}

function renderRow(a) {
  const tagsHtml = a.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');
  print(`<div class="line ls-row">
    <span class="ls-date">${a.date}</span>
    <span class="ls-size">${a.words}w</span>
    <span class="ls-name">
      <a onclick="readArticle('${a.id}')">${esc(a.title)}</a>${tagsHtml}
    </span>
  </div>`);
}

async function showAbout() {
  output.innerHTML = '';
  setActive('about');
  line('<span class="c-dim">$ cat ./about.md</span>');
  blank();
  try {
    const md = await loadArticle('about');
    print(`<div class="article-body">${marked.parse(md)}</div>`);
  } catch {
    line('<span class="c-red">about.md not found</span>');
  }
  blank();
  line('<span class="c-dim">$ <span class="cursor"></span></span>');
}

async function readArticle(id) {
  const meta = ARTICLES.find(a => a.id === id);
  if (!meta) {
    line(`<span class="c-red">cat: ${esc(id)}: No such file or directory</span>`);
    return;
  }
  output.innerHTML = '';
  setActive('articles');
  line(`<span class="c-dim">$ cat ./articles/${esc(id)}.md</span>`);
  line('<span class="c-dim">loading...</span>');
  try {
    const md = await loadArticle(id);
    output.innerHTML = '';
    line(`<span class="c-dim">$ cat ./articles/${esc(id)}.md</span>`);
    blank();
    print(`<div class="article-body">${marked.parse(md)}</div>`);
    blank();
    line('<span class="c-dim">─── EOF ───────────────────────────────────</span>');
    blank();
    print('<div class="line"><a class="back-link" onclick="showList()">← back to articles</a></div>');
  } catch {
    line(`<span class="c-red">Error: could not load ${esc(id)}.md</span>`);
  }
}

// ── Commands ──────────────────────────────────────────────────────────────────
const CMDS = {
  help() {
    blank();
    line('<span class="c-amber">available commands:</span>');
    blank();
    line('  <span class="c-cyan">ls</span>, <span class="c-cyan">list</span>         — 列出所有文章');
    line('  <span class="c-cyan">cat</span> &lt;article-id&gt;  — 閱讀指定文章');
    line('  <span class="c-cyan">about</span>             — 關於這個部落格');
    line('  <span class="c-cyan">home</span>              — 回到首頁');
    line('  <span class="c-cyan">clear</span>             — 清除畫面');
    line('  <span class="c-cyan">help</span>              — 顯示此說明');
    blank();
    line('<span class="c-dim">article ids:</span>');
    ARTICLES.forEach(a => line(`  <span class="c-dim">${esc(a.id)}</span>`));
    blank();
  },
  ls()    { showList(); },
  list()  { showList(); },
  about() { showAbout(); },
  home()  { showHome(); },
  clear() { output.innerHTML = ''; },
  cat(args) {
    if (!args) { line('<span class="c-red">usage: cat &lt;article-id&gt;</span>'); return; }
    readArticle(args.trim());
  }
};

function run(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;
  cmdHistory.unshift(trimmed);
  histIdx = -1;
  echoCmd(trimmed);
  const [cmd, ...rest] = trimmed.split(/\s+/);
  const fn = CMDS[cmd.toLowerCase()];
  if (fn) {
    fn(rest.join(' ') || '');
  } else {
    line(`<span class="c-red">bash: ${esc(cmd)}: command not found</span>`);
    line('<span class="c-dim">type <span class="c-cyan">help</span> for available commands</span>');
    blank();
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = cmdInput.value; cmdInput.value = ''; run(v);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) cmdInput.value = cmdHistory[++histIdx];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { cmdInput.value = cmdHistory[--histIdx]; }
    else { histIdx = -1; cmdInput.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const v = cmdInput.value.trim();
    const ids = ARTICLES.map(a => a.id);
    const cmds = ['help','ls','list','cat','about','home','clear'];
    const matches = [...cmds, ...ids].filter(s => s.startsWith(v));
    if (matches.length === 1) cmdInput.value = matches[0] + ' ';
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('a') && !e.target.closest('button')) cmdInput.focus();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadManifest();
  } catch {
    line('<span class="c-red">Error: could not load articles/index.json</span>');
  }
  showHome();
  setTimeout(() => cmdInput.focus(), 150);
})();
</script>
</body>
</html>
